<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MDT Admin Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
      font-family: "Segoe UI", Tahoma, sans-serif;
    }

    body {
      margin: 0;
      background: #0a0a0a;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 420px;
      background: #111;
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
      border: 1px solid #1f1f1f;
    }

    h2 {
      margin: 0 0 20px;
      text-align: center;
      font-weight: 600;
      color: #ffffff;
    }

    h2 span {
      color: #0072ce;
    }

    .input-group {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #000;
      color: #fff;
      outline: none;
      font-size: 14px;
    }

    input::placeholder {
      color: #777;
    }

    button {
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      background: #0072ce;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #005fa8;
    }

    .card {
      margin-top: 20px;
      padding: 20px;
      border-radius: 12px;
      background: #000;
      text-align: center;
      border: 1px solid #222;
    }

    .card h3 {
      margin: 0 0 10px;
      font-size: 14px;
      color: #aaa;
    }

    .count {
      font-size: 36px;
      font-weight: bold;
      color: #0072ce;
    }

    .status {
      margin-top: 10px;
      font-size: 13px;
      color: #888;
    }

    .error {
      color: #ff4d4d;
    }

    .success {
      color: #4ade80;
    }

  </style>
</head>

<body>

  <div class="container">
    <h2>🔐 <span>MDT</span> Admin</h2>

    <div class="input-group">
      <input type="password" id="adminKey" placeholder="Enter admin key">
      <button onclick="loadData()">Load</button>
    </div>

    <div class="card">
      <h3>📥 Total Downloads</h3>
      <div id="downloads" class="count">--</div>
      <div id="status" class="status">Waiting for input...</div>
    </div>
  </div>

  <script>
    const API_URL = "https://mikrodtech-backend.onrender.com";

    async function loadData() {
      const key = document.getElementById("adminKey").value;
      const statusEl = document.getElementById("status");

      if (!key) {
        statusEl.textContent = "⚠️ Enter admin key";
        statusEl.className = "status error";
        return;
      }

      statusEl.textContent = "Loading...";
      statusEl.className = "status";

      try {
        const res = await fetch(`${API_URL}/admin/downloads/mdt-remind?key=${key}`);
        const data = await res.json();

        if (data.error) {
          statusEl.textContent = "❌ Unauthorized";
          statusEl.className = "status error";
          return;
        }

        document.getElementById("downloads").textContent = data.count;
        statusEl.textContent = "✅ Data loaded";
        statusEl.className = "status success";

      } catch (err) {
        console.error(err);
        statusEl.textContent = "❌ Failed to load";
        statusEl.className = "status error";
      }
    }
  </script>

</body>
</html>
